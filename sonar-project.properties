# SonarQube project configuration for ACWD Water Usage Integration

# Project identification
sonar.projectKey=funkadelic_ha-acwd
sonar.organization=funkadelic

# Project metadata
sonar.projectName=ACWD Water Usage Integration
sonar.projectVersion=1.0.18

# Source code location
sonar.sources=custom_components/acwd
sonar.tests=tests
sonar.test.inclusions=tests/**/*

# Exclude test files from duplication detection
sonar.cpd.exclusions=tests/**/*

# Python version for analysis
# pytest-homeassistant-custom-component 0.13.310+ requires Python 3.13+
sonar.python.version=3.13

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
